<div class="w-80 border-r border-border flex flex-col overflow-hidden">
  <div class="p-4 border-b border-border flex items-center gap-3">
    <button hlmBtn variant="ghost" size="icon" (click)="back.emit()">
      <ng-icon name="lucideArrowLeft" size="18" />
    </button>
    <span class="font-medium text-sm truncate">{{ id() }}</span>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-6">
    <sidebar-crop [crop]="opts().crop" (cropChange)="patch({ crop: $event })" />
    <sidebar-resize [resize]="opts().resize" (resizeChange)="patch({ resize: $event })" />
    <sidebar-rotate [angle]="opts().rotate?.angle ?? 0" (angleChange)="patch({ rotate: { angle: $event } })" />
    <sidebar-flip-mirror [flip]="opts().flip ?? false" [mirror]="opts().mirror ?? false" (change)="patch($event)" />
    
    <sidebar-filter [filters]="opts().filters ?? []" (filtersChange)="patch({ filters: $event })" />
    <sidebar-watermark [watermark]="opts().watermark" (watermarkChange)="patch({ watermark: $event })" />
    <sidebar-format [format]="opts().format" (formatChange)="patch({ format: $event })" />
    <sidebar-compress [compress]="opts().compress" (compressChange)="patch({ compress: $event })" />
  </div>

  <div class="p-4 border-t border-border">
    <button hlmBtn class="w-full" (click)="save.emit()" [disabled]="isSaving()">
      @if (isSaving()) {
        <ng-icon name="lucideLoader" size="16" class="mr-2 animate-spin" />
      } @else {
        <ng-icon name="lucideSave" size="16" class="mr-2" />
      }
      Save
    </button>
  </div>
</div>
