<div
    class="flex flex-col items-center justify-center gap-3 rounded-lg border border-dashed border-border p-12 transition-colors cursor-pointer"
    [class.bg-muted]="isDragging"
    (click)="fileInput.click()"
    (dragover)="onDragOver($event)"
    (dragleave)="isDragging = false"
    (drop)="onDrop($event)"
>
    @if (isLoading()) {
        <hlm-spinner icon="lucideLoader" class="text-2xl" />
    } @else {
        <div class="p-2.5">
            <ng-icon name="lucideUpload" size="24" />
        </div>
        <span class="text-center text-sm font-medium">Drop images here or click to upload</span>
        <span class="text-center text-xs text-muted-foreground">Supports JPG, PNG, WEBP — up to 10MB</span>
        <span class="text-center text-xs text-muted-foreground">Multiple files not supported yet </span>
    }

    <input 
        #fileInput 
        type="file" 
        class="hidden" 
        accept="image/*" 
        multiple (change)="onFileSelect($event)" 
        [disabled]="isLoading()"
    />
</div>
