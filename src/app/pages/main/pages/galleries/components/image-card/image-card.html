<div class="rounded-lg border border-border bg-card overflow-hidden">
  <div class="relative aspect-square overflow-hidden bg-muted">
    <img
      [src]="image().url"
      [alt]="image().id"
      loading="lazy"
      class="w-full h-full object-cover transition-transform duration-300"
      (load)="loaded.set(true)"
    />
    @if (!loaded()) {
      <hlm-skeleton class="h-full w-full rounded-xl" />
    }
  </div>

  <div class="p-3 flex items-center justify-between">
    <div class="flex flex-col min-w-0">
      <span class="text-sm font-bold truncate">{{ image().name }}</span>
      <span hlmBadge class="text-xs mt-1" variant="secondary">v{{ image().version }}</span>
    </div>
    <div>
      <button hlmBtn variant="secondary" size="icon-lg" (click)="edit.emit(image().id)" >
        <ng-icon name="lucidePencil" size="16" />
      </button>
      <button hlmBtn variant="ghost" size="icon-lg" class="text-destructive hover:text-destructive" (click)="deleteAlert.open()" >
        <ng-icon name="lucideTrash2" size="16" />
      </button>
    </div>
  </div>
  <div class="px-3 pb-3">
    <span class="text-xs text-muted-foreground truncate">
      id: {{ image().id }}
    </span>
  </div>
</div>

<hlm-alert-dialog #deleteAlert>
  <hlm-alert-dialog-content *hlmAlertDialogPortal="let ctx" class="text-foreground min-w-xl lg:min-w-lg">
    <hlm-alert-dialog-header>
      <h2 hlmAlertDialogTitle>Delete this image?</h2>
      <p hlmAlertDialogDescription> This action cannot be undone </p>
    </hlm-alert-dialog-header>
    <hlm-alert-dialog-footer>
      <button hlmAlertDialogCancel (click)="ctx.close()">Cancel</button>
      <button hlmAlertDialogAction variant="destructive" (click)="delete.emit(image().id); ctx.close()">Delete</button>
    </hlm-alert-dialog-footer>
  </hlm-alert-dialog-content>
</hlm-alert-dialog>
