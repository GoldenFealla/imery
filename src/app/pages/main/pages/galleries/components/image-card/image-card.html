<div class="rounded-lg border border-border bg-card overflow-hidden">
  <div class="relative aspect-square overflow-hidden bg-muted">
    <img
      [src]="image().url"
      [alt]="image().id"
      loading="lazy"
      class="w-full h-full object-cover transition-transform duration-300"
      (load)="loaded.set(true)"
    />
    @if (!loaded()) {
      <hlm-skeleton class="h-full w-full rounded-xl" />
    }
  </div>

  <div class="p-3 flex items-center justify-between gap-2">
    <div class="flex flex-col min-w-0">
      <span class="text-sm font-bold truncate">{{ image().id }}</span>
      <span hlmBadge class="text-xs mt-2" variant="secondary">v{{ image().version }}</span>
    </div>
  </div>
  <div class=" p-3 flex flex-row items-center justify-end gap-1 shrink-0">
    <button hlmBtn variant="secondary" size="icon-lg" (click)="edit.emit(image().id)" >
      <ng-icon name="lucidePencil" size="16" />
    </button>
    <button hlmBtn variant="ghost" size="icon-lg" class="text-destructive hover:text-destructive" (click)="delete.emit(image().id)" >
      <ng-icon name="lucideTrash2" size="16" />
    </button>
  </div>
</div>
